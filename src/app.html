<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<script>
			if (['etso.es', 'www.etso.es'].includes(window.location.hostname)) {
				let analyticsLoaded = false;
				const loadAnalytics = () => {
					if (analyticsLoaded) return;
					analyticsLoaded = true;

					const script = document.createElement('script');
					script.async = true;
					script.src = 'https://www.googletagmanager.com/gtag/js?id=G-45NQN8Q5LD';
					document.head.appendChild(script);

					window.dataLayer = window.dataLayer || [];
					window.gtag = function(){window.dataLayer.push(arguments);}
					window.gtag('js', new Date());
					window.gtag('config', 'G-45NQN8Q5LD');
				};

				const interactionOptions = { once: true, passive: true };
				window.addEventListener('pointerdown', loadAnalytics, interactionOptions);
				window.addEventListener('keydown', loadAnalytics, { once: true });
				window.addEventListener('scroll', loadAnalytics, interactionOptions);
				window.addEventListener('touchstart', loadAnalytics, interactionOptions);

				window.setTimeout(() => {
					if (document.visibilityState === 'visible') loadAnalytics();
				}, 15000);
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
